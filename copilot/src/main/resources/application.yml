# ============================================================
# Spring Boot 3 REST API Demo - Application Configuration
# ============================================================

spring:
  application:
    name: demo-api

  # --- Datasource (MySQL for production) ---
  datasource:
    url: jdbc:mysql://localhost:3306/demo?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # --- Downstream Services ---
app:
  downstream:
    notification:
      base-url: http://localhost:8090

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # --- Flyway Migration ---
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration/mysql
    baseline-on-migrate: true
    validate-on-migrate: true

# --- Server ---
server:
  port: 8080
  servlet:
    context-path: /

# --- Logging ---
logging:
  level:
    com.example.demo: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: DEBUG
