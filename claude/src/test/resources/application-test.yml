# Test profile configuration
# Uses H2 in-memory database with MySQL compatibility mode

spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # --- WireMock port for downstream stubs ---
wiremock:
  server:
    port: 0

app:
  downstream:
    notification:
      base-url: http://localhost:${wiremock.server.port}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    locations: classpath:db/migration,classpath:db/test-migration
    clean-disabled: false

logging:
  level:
    com.example.demo: DEBUG
    org.springframework.test: WARN
